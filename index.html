<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fancy DevOps App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(270deg, #6a11cb, #2575fc);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 50px;
      width: 90%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    h1 span {
      color: #ffdd57;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    .badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 0.9rem;
      margin-bottom: 25px;
    }

    button {
      padding: 14px 35px;
      font-size: 1rem;
      border: none;
      border-radius: 30px;
      background: linear-gradient(45deg, #ff512f, #f09819);
      color: white;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 25px rgba(0,0,0,0.4);
    }

    footer {
      margin-top: 25px;
      font-size: 0.8rem;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="badge">🚀 Azure DevOps Deployment</div>
    <h1>Hello <span>World</span></h1>
    <p>
      This fancy app is deployed using <b>Azure DevOps CI/CD</b><br>
      running beautifully on <b>Kubernetes</b>.
    </p>
    <button>✨ Deployed Successfully</button>
    <footer>
      Powered by DevOps • Cloud • Automation
    </footer>
  </div>
</body>
</html>
